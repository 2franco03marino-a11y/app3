<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Digital Clock</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; margin: 0; }
        #clock { font-size: 5rem; border: 2px solid #00ff00; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px #00ff00; }
    </style>
</head>
<body>
    <div id="clock">00:00:00</div>
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
